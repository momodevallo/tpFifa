<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Packs - FIFA Project</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="/dashboard.html">
        <div class="brand-badge">⚽</div>
        <span>FIFA Ultimate Project</span>
      </a>
      <nav class="nav">
        <a href="/dashboard.html">Accueil</a>
        <a href="/collection.html">Collection</a>
        <a href="/packs.html">Packs</a>
        <a href="/marketplace.html">Marketplace</a>
        <a href="/equipe.html">Équipe</a>
      </nav>
      <div class="userbox">
        <div class="user-pill">👤 <span data-user-pseudo>...</span></div>
        <div class="user-pill">💰 <span data-user-credits>...</span></div>
        <button class="btn-ghost" onclick="logout()">Déconnexion</button>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <section class="page-header">
        <div>
          <h1>Ouverture de packs</h1>
          <p class="muted">Chaque ouverture déclenche un traitement asynchrone identifié par UUID.</p>
        </div>
      </section>

      <div id="packMessage" class="info hidden"></div>
      <section id="packGrid" class="pack-grid"></section>

      <section class="page-header" style="margin-top:28px;">
        <div>
          <h1>Résultat du dernier pack</h1>
          <p class="muted">Le front interroge l'API jusqu'à ce que le pack soit prêt.</p>
        </div>
      </section>

      <article class="card">
        <div id="jobState" class="info">Aucun pack ouvert pour le moment.</div>
        <div id="packResult" class="player-grid" style="margin-top:16px;"></div>
      </article>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    setActiveNav();
    let pollingInterval = null;

    async function loadPacks() {
      const packs = await apiFetch('/api/packs');
      const grid = document.getElementById('packGrid');
      grid.innerHTML = packs.map(pack => `
        <article class="card">
          <div class="card-title">
            <h2>${escapeHtml(pack.nom)}</h2>
            <span class="badge">${pack.prix} crédits</span>
          </div>
          <div class="list">
            <div class="list-row"><span>Nombre de cartes</span><strong>${pack.nbCartes}</strong></div>
            <div class="list-row"><span>Bronze</span><strong>${pack.pctBronze}%</strong></div>
            <div class="list-row"><span>Argent</span><strong>${pack.pctArgent}%</strong></div>
            <div class="list-row"><span>Or</span><strong>${pack.pctOr}%</strong></div>
          </div>
          <div class="player-actions" style="margin-top:16px;">
            <button class="btn" onclick="openPack(${pack.id}, '${escapeHtml(pack.nom)}')">Ouvrir ce pack</button>
          </div>
        </article>
      `).join('');
    }

    async function openPack(id, nom) {
      clearInterval(pollingInterval);
      document.getElementById('packResult').innerHTML = '';
      document.getElementById('jobState').className = 'warning';
      document.getElementById('jobState').innerHTML = `<span class="spinner"></span> Ouverture de ${nom} en cours...`;

      try {
        const launch = await apiFetch(`/api/packs/${id}/ouvrir`, { method: 'POST' });
        const uuid = launch.uuid;
        showMessage('#packMessage', 'info', `Pack lancé avec l'identifiant ${uuid}`);
        pollingInterval = setInterval(() => checkPack(uuid), 1000);
      } catch (error) {
        showMessage('#packMessage', 'error', error.message || 'Impossible d\'ouvrir le pack.');
        document.getElementById('jobState').className = 'error';
        document.getElementById('jobState').textContent = error.message || 'Erreur lors du lancement du pack.';
      }
    }

    async function checkPack(uuid) {
      try {
        const result = await apiFetch(`/api/packs/${uuid}`);
        if (result.statut === 'READY') {
          clearInterval(pollingInterval);
          document.getElementById('jobState').className = 'success';
          document.getElementById('jobState').textContent = `${result.message} — UUID : ${uuid}`;
          document.getElementById('packResult').innerHTML = result.cartes.map(carte => renderPlayerCard(carte)).join('');
          const credits = await apiFetch('/api/moi/credits');
          document.querySelectorAll('[data-user-credits]').forEach(node => node.textContent = `${credits.credits} crédits`);
        } else if (result.statut === 'FAILED') {
          clearInterval(pollingInterval);
          document.getElementById('jobState').className = 'error';
          document.getElementById('jobState').textContent = result.message || 'Le pack a échoué.';
        }
      } catch (error) {
        if ((error.message || '').toLowerCase().includes('cours')) {
          document.getElementById('jobState').className = 'warning';
          document.getElementById('jobState').innerHTML = `<span class="spinner"></span> Pack en attente...`;
          return;
        }
        clearInterval(pollingInterval);
        document.getElementById('jobState').className = 'error';
        document.getElementById('jobState').textContent = error.message || 'Erreur pendant le suivi du pack.';
      }
    }

    (async () => {
      await loadSessionInfo();
      await loadPacks();
    })();
  </script>
</body>
</html>
