<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/boutique.css">
    <title>Boutique - FIFA TP</title>
</head>
<body>
<div id="tp-header"></div>
<script src="/js/header.js"></script>

<main>
    <section class="shop">
        <div class="shop-heading">
            <div>
                <h2 class="shop-title">Packs</h2>
                <p class="shop-description">Ouvrez des packs et essayez d'obtenir vos joueurs préférés.</p>
            </div>
            <div id="shopStatus" class="shop-status shop-status--hidden"></div>
        </div>

        <div class="packs-container">
            <div class="pack-card" data-type="bronze">
                <div class="pack-image">
                    <img src="https://fifautbin.com/wp-content/uploads/2023/12/fifa-rare-bronze-pack-207x300.png" alt="Pack Bronze">
                </div>
                <div class="pack-info">
                    <h3 class="pack-name">Pack Bronze</h3>
                    <p class="pack-description">3 joueurs</p>
                    <div class="pack-price">
                        <span>100 crédits</span>
                    </div>
                    <button class="btn-buy" data-pack="bronze">Acheter</button>
                </div>
            </div>

            <div class="pack-card" data-type="silver">
                <div class="pack-image">
                    <img src="https://fifautbin.com/wp-content/uploads/2023/12/fifa-rare-silver-pack.png" alt="Pack Argent">
                </div>
                <div class="pack-info">
                    <h3 class="pack-name">Pack Argent</h3>
                    <p class="pack-description">3 bons joueurs</p>
                    <div class="pack-price">
                        <span>300 crédits</span>
                    </div>
                    <button class="btn-buy" data-pack="silver">Acheter</button>
                </div>
            </div>

            <div class="pack-card" data-type="gold">
                <div class="pack-image">
                    <img src="https://fifautbin.com/wp-content/uploads/2023/12/fifa-gold-pack.png" alt="Pack Or">
                </div>
                <div class="pack-info">
                    <h3 class="pack-name">Pack Or</h3>
                    <p class="pack-description">3 très bons joueurs</p>
                    <div class="pack-price">
                        <span>600 crédits</span>
                    </div>
                    <button class="btn-buy" data-pack="gold">Acheter</button>
                </div>
            </div>
        </div>

        <section class="shop-result">
            <div class="shop-heading" style="margin-top: 2rem;">
                <div>
                    <h3 class="shop-title" style="font-size: 1.5rem;">Dernier pack ouvert</h3>
                    <p class="shop-description">Les joueurs obtenus s'affichent ici directement dans la page.</p>
                </div>
            </div>
            <div id="packResult" class="reveal-grid"></div>
        </section>
    </section>
</main>

<script src="/js/boutique.js"></script>
</body>
</html>
