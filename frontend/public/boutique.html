<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/boutique.css">
    <title>Boutique - FIFA TP</title>
</head>
<body>
<div id="tp-header"></div>
<script src="/js/header.js"></script>

<main>
    <section class="shop">
        <div class="shop-heading">
            <div>
                <h2 class="shop-title">Packs</h2>
                <p class="shop-description">Choisisez un pack à acheter !</p>
            </div>
        </div>

        <div class="packs-container">
            <div class="pack-card" data-type="bronze">
                <div class="pack-image">
                    <img src="https://tse1.explicit.bing.net/th/id/OIP.d5LtTjycAIAEVLP8eub-ugAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Pack Bronze"
                         >
                </div>
                <div class="pack-info">
                    <h3 class="pack-name">Pack Bronze</h3>
                    <p class="pack-description">3 joueurs</p>
                    <div class="pack-price"><span>100 crédits</span></div>
                    <button class="btn-buy" data-pack="bronze">Acheter</button>
                </div>
            </div>

            <div class="pack-card" data-type="silver">
                <div class="pack-image">
                    <img src="https://tse3.mm.bing.net/th/id/OIP.Nr-ERESnpTkrHiB0BP300wAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Pack Argent"
                         >
                </div>
                <div class="pack-info">
                    <h3 class="pack-name">Pack Argent</h3>
                    <p class="pack-description">3 joueurs</p>
                    <div class="pack-price"><span>300 crédits</span></div>
                    <button class="btn-buy" data-pack="silver">Acheter</button>
                </div>
            </div>

            <div class="pack-card" data-type="gold">
                <div class="pack-image">
                    <img src="https://fifautbin.com/wp-content/uploads/2023/12/fifa-gold-pack.png" alt="Pack Or"
                         >
                </div>
                <div class="pack-info">
                    <h3 class="pack-name">Pack Or</h3>
                    <p class="pack-description">3 joueurs</p>
                    <div class="pack-price"><span>600 crédits</span></div>
                    <button class="btn-buy" data-pack="gold">Acheter</button>
                </div>
            </div>
        </div>

        <section id="packExperience" class="pack-experience hidden" aria-live="polite">
            <div class="pack-experience__header">
                <h3 id="packExperienceTitle">Ouverture du pack</h3>
                <p id="packExperienceText">Préparation...</p>
            </div>

            <div id="packStage" class="pack-stage stage-idle">
                <div id="packBox" class="pack-box">
                    <div class="pack-box__shine"></div>
                    <div class="pack-box__label">PACK</div>
                </div>
            </div>

            <div id="packRevealGrid" class="reveal-grid"></div>
        </section>
    </section>
</main>

<script src="/js/boutique.js"></script>
</body>
</html>
