<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/mes-joueurs.css">
    <title>Mes Joueurs - FIFA TP</title>
</head>
<body>
<div id="tp-header"></div>
<script src="/js/header.js"></script>

<main>
    <section class="club">
        <div class="club-header">
            <h2 class="club-title">Mes Joueurs</h2>
            <div class="stats">
                <span id="totalPlayers">0</span> joueurs dans ton club
            </div>
        </div>

        <div class="filters">
            <input type="text" id="search" placeholder="Rechercher un joueur..." class="search-input">
            <select class="filter-select" id="filterPosition">
                <option value="all">Tous les postes</option>
                <option value="ATT">Attaquant</option>
                <option value="MIL">Milieu</option>
                <option value="DEF">Défenseur</option>
                <option value="GB">Gardien</option>
            </select>
        </div>

        <div class="players-grid"></div>
    </section>
</main>

<script src="/js/mes-joueurs.js"></script>
</body>
</html>
